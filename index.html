<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Página</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      max-width: 700px;
      width: 100%;
      background: #1a1a1a;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    img {
      width: 100%;
      display: block;
    }

    .content {
      padding: 40px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    p {
      color: #cfcfcf;
      line-height: 1.7;
      font-size: 1.1rem;
    }
  </style>
</head>

<body>

  <div class="card">

    <img src="https://picsum.photos/1200/700" alt="Imagen">

    <div class="content">
      <h1>Mi primera web</h1>

      <p>
        Esta página está alojada gratis usando GitHub Pages.
      </p>
    </div>

  </div>

</body>
</html>
